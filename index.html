<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>난이도3/4_오픽승혜쌤</title>
<style>
  :root{ --navy:#1f3a5f; --navy2:#2c5282; --line:#e2e6ee; --bg:#f4f6fa;
    --sub:#5a6678; --red:#c0392b; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:#1a2233;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:11px 16px; position:sticky; top:0; z-index:30;}
  header .ch{font-size:13px; opacity:.95; font-weight:800;}
  header h1{margin:3px 0 0; font-size:18px; font-weight:800;}
  header .sub{font-size:12px; opacity:.85; margin-top:3px;}
  .chtabs{display:flex; flex-wrap:wrap; gap:7px; padding:9px 12px;
    background:#fff; border-bottom:1px solid var(--line);
    position:sticky; top:62px; z-index:22;}
  .chtab{flex:0 0 auto; border:1.5px solid var(--line); background:#fff;
    color:var(--sub); border-radius:20px; padding:7px 13px; font-size:13px;
    font-weight:800; white-space:nowrap; cursor:pointer; line-height:1.15;}
  .chtab small{font-size:10px; display:block; opacity:.7; font-weight:700;}
  .chtab.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  main{max-width:820px; margin:0 auto; padding:14px 14px 120px;}
  .chead{margin:6px 2px 14px;}
  .chead .badge{display:inline-block; background:var(--red); color:#fff;
    font-size:12px; font-weight:800; padding:3px 11px; border-radius:14px;}
  .chead h2{margin:8px 0 2px; font-size:21px;}
  .chead .cnt{color:var(--sub); font-size:13px;}
  .legend{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .legend .qty{cursor:default;}
  .q{background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-bottom:11px; display:flex; gap:11px; align-items:flex-start;
    box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .numcol{flex:0 0 auto; width:40px; display:flex; flex-direction:column; align-items:center; gap:5px; padding-top:5px;}
  .num{color:var(--sub); font-weight:800; font-size:13px;}
  .qty{font-size:10px; font-weight:800; padding:2px 7px; border-radius:8px; color:#fff; white-space:nowrap; letter-spacing:.2px; text-align:center; line-height:1.15;}
  .qty b{display:block; font-size:8px; font-weight:800; opacity:.92; margin-top:1px; letter-spacing:.3px;}
  .qty.d{background:#2c5282;} .qty.e{background:#2f855a;} .qty.c{background:#6b46c1;}
  .qty.i{background:#c05621;} .qty.r{background:#0d9488;}
  .play{flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none;
    background:var(--navy); color:#fff; font-size:16px; cursor:pointer; margin-top:2px;
    display:flex; align-items:center; justify-content:center;}
  .play:active{transform:scale(.92);}
  .q.active .play{background:var(--red);}
  .txt{flex:1 1 auto; cursor:pointer; padding-top:2px;}
  .txt .en{font-size:16.5px; line-height:1.5; font-weight:600; color:#1a2233;}
  .kohint{font-size:12px; color:var(--navy2); margin-top:6px; font-weight:700; user-select:none;}
  .ko{display:none; margin-top:7px; font-size:14.5px; line-height:1.55; color:#37425a;
    background:var(--bg); border-radius:9px; padding:9px 11px;}
  .q.show-ko .ko{display:block;}
  .tip{color:var(--sub); font-size:12.5px; text-align:center; margin-top:8px; line-height:1.6;}
  .ctrl{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:9px 14px calc(9px + env(safe-area-inset-bottom)); z-index:25;
    display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .ctrl .lab{font-size:12px; color:var(--sub); font-weight:700;}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .seg button{border:none; background:#fff; padding:7px 12px; font-size:13px; font-weight:800;
    color:var(--sub); cursor:pointer;}
  .seg button.on{background:var(--navy); color:#fff;}
  .stopb{border:1px solid var(--line); background:#fff; border-radius:10px; padding:7px 14px;
    font-weight:800; color:var(--navy); cursor:pointer; font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="ch">난이도3/4_오픽승혜쌤 🎧</div>
  <h1 id="hTitle">질문 듣기</h1>
  <div class="sub">▶ 를 누르면 영어 질문이 들립니다. 문장을 누르면 한국어 뜻이 보입니다.</div>
</header>
<div class="chtabs" id="chtabs"></div>
<main id="main"></main>
<div class="ctrl">
  <span class="lab">속도</span>
  <div class="seg" id="rateSeg">
    <button data-r="0.6">0.6x</button>
    <button data-r="0.75" class="on">0.75x</button>
    <button data-r="0.9">0.9x</button>
    <button data-r="1">1.0x</button>
  </div>
  <button class="stopb" id="stopBtn">■ 정지</button>
</div>
<script>
const CHAPTERS = [{"ch": "CH1", "title": "구직", "q": [["You indicated in the survey that you are looking for a job. Tell me about the company that you would like to work with. What services or products does it provide to customers?", "설문조사에서 일자리를 찾고 있다고 했습니다. 당신이 일하고 싶은 회사에 대해 얘기해 주세요. 고객에게 어떤 서비스나 제품을 제공하나요?", "묘사", ""], ["You indicated in the survey that you are looking for a job. Tell me about the job you are looking for and what you are preparing for the job.", "설문조사에서 일자리를 찾고 있다고 했습니다. 당신이 찾고 있는 직업과 그 직업을 위해 준비하고 있는 것에 대해 얘기해 주세요.", "묘사", ""], ["Please tell me about where companies are usually located in your country. What are those places like? How are they different from each other?", "한국에서 회사들이 위치한 곳에 대해 묘사해주세요. 그 장소들은 어떤가요? 서로 어떻게 다른가요?", "묘사", ""], ["Tell me about the requirements of the job you are looking for. What do companies require to candidates? How can job seekers prepare for the job?", "당신이 찾고 있는 직업의 자격 요건에 대해 얘기해 주세요. 기업은 지원자에게 무엇을 요구하나요? 구직자는 어떻게 취업을 준비할 수 있나요?", "묘사", ""], ["Please describe the website you visit for job seeking. What is it called and what can you do on that website? How do you use the internet when looking for a job?", "구직을 위해 방문하는 웹사이트를 설명해주세요. 웹사이트의 이름은 무엇이며, 그 웹사이트에서 어떤것들을 할 수 있습니까? 일자리를 찾을 때 인터넷을 어떻게 사용하나요?", "묘사", ""], ["Tell me about a recent job application experience. What was it like, and what happened? Please describe it in as many details as possible.", "최근에 회사에 지원했던 경험에 대해서 얘기해주세요. 어떤 일이었고, 어떤 일이 일어났나요?", "경험", ""], ["Can you tell me how has the way people view jobs and they look for jobs changed? How is it different from the past?", "사람들이 직업을 바라보는 시각과 구직하는 방식이어떻게 바뀌었나요? 과거와 어떻게 달라졌나요?", "비교", "IH-AL"], ["What are the concerns or problems do people talk about when looking for a job? Why do those problems occur and how can people solve the problems?", "사람들이 구직에 대해 이야기하는 걱정이나 문제는무엇인가요? 이러한 문제가 발생하는 이유는 무엇이며, 사람들은 어떻게 문제를 해결할 수 있을까요?", "이슈", "AL"]]}, {"ch": "CH2", "title": "동네, 이웃", "q": [["You indicated in the survey that you live in an apartment. What is your neighborhood like? Where is it located? Please describe your neighborhood in detail.", "당신은 설문에서 아파트에 산다고 했습니다. 당신의동네는 어떤가요? 어디에 위치해 있나요? 당신의 동네에 대해 상세히 묘사해 주세요.", "묘사", ""], ["I would like to know about your neighborhood. What does your neighborhood look like? Please describe your neighborhood in as much detail as possible.", "당신의 동네에 대해 알고 싶어요. 동네가 어떻게 생겼나요? 당신의 동네를 되도록 상세히 설명해 주세요.", "묘사", ""], ["I live in the U.S. Ask me 3 or 4 questions to find out where I live.", "저는 미국에 삽니다. 제가 사는 동네에 대해 질문 세네개를 해보세요.", "RP", ""], ["I would like to know about your neighbors. Who are they? What do they do? How often do you interact with them?", "당신의 이웃에 대해 알고 싶어요. 그들은 누구인 가요? 그들은 무슨 일을 하나요? 당신은 얼마나 자주그들과 교류하나요?", "묘사", ""], ["Can you tell me about your neighbors? Describe one of your neighbors in detail.", "당신의 이웃에 대해 알고 싶어요. 묘사해보세요.", "묘사", ""], ["How did you first become acquainted with that neighbor? Are you close to the person? What do you usually do together?", "당신의 이웃에 대해 말해줄 수 있나요? 당신의 이웃중 한 명을 상세히 설명해 주세요. 그 이웃을 어떻게처음 알게 되었나요? 그 이웃과 친한 가요? 보통 함께 무엇을 하나요?", "묘사", ""], ["I also have close neighbors. Ask me 3 or 4 questions about my neighbor.", "저도 친한 이웃이 있습니다. 제 이웃에 대해 질문 세네개를 해보세요.", "RP", ""], ["Can you tell me about an interesting or memorable experience you have had in your neighborhood? Tell me about the experience in detail and explain what made it so memorable.", "당신의 동네에서 있었던 재미있거나 기억에 남는 경험에 대해 이야기해 줄 수 있나요? 그 경험에 대해 상세히 이야기하고 무엇 때문에 그 경험이 그렇게 기억에 남게 되었는지 설명해 주세요.", "경험", ""], ["Please tell me about a memorable experience you have had in your neighborhood. When and where did it occur? What happened that made the experience so memorable? Please describe it in detail.", "당신이 동네에서 겪었던 기억에 남는 경험에 대해서이야기해 주세요. 언제 그리고 어디서 그일이 일어났나요? 어떤 점이 그 경험을 기억에 남게 만들었나요? 그것에 대해 상세히 설명해 주세요.", "경험", ""], ["How has your neighborhood changed from when you were young? Describe in detail how it was in the past, and how it is now.", "당신의 동네가 당신이 어렸을 때에 비해 어떻게 변했나요? 과거에 어땠고, 지금은 어떤지 상세히 묘사해주세요.", "비교", "IM3"], ["I’d like to talk about any changes in your neighborhood in the last 10 years. Describe in detail the similarities and differences between your neighborhood today and neighborhood when you grew up.", "지난 10년 동안 당신의 동네에 어떤 변화가 있었 는지에 대해 이야기하고 싶습니다. 오늘날 당신의 동네와 당신이 자랐을 때의 동네의 유사점과 차이점을 자세히 설명하세요.", "비교", "IM3"]]}, {"ch": "CH3", "title": "집", "q": [["You indicated in the survey that you live in an apartment. Tell me about your home. What does it look like? What types of rooms does it have? Please describe it in detail.", "당신은 설문에서 아파트에 산다고 했습니다. 당신의집에 대해 이야기해 주세요. 집의 외관이 어떻게 생겼나요? 어떤 종류의 방들이 있나요? 그것에 대해서 상세히 묘사해 주세요.", "묘사", ""], ["Please tell me about your house. What’s your favorite room? What does it look like? Why do you like that room?", "당신의 집에 대해서 이야기해 주세요. 당신이 가장 좋아하는 방은 어디인가요? 그곳은 어떻게 생겼나요? 왜 그 방을 좋아하나요?", "묘사", ""], ["Tell me about your bedroom. What does it look like and what do you keep in it? Use as many details as possible to describe it.", "당신의 침실에 대해 이야기해 주세요. 침실은 어떻게생겼고 당신은 침실 안에 무엇을 두고 있나요? 침실을 묘사하기 위해서 되도록 상세한 내용을 많이 사용하세요.", "묘사", ""], ["Have you made any changes to your house within the last few years? If so, what kinds of changes have you made to your home? Are you satisfied with the changes?", "당신은 지난 몇 년간 집에 변화를 준 적이 있나요? 그렇다면, 당신은 집에 어떤 종류의 변화를 주었나요? 그 변화에 만족하나요?", "경험", ""], ["Compare the home you lived in before to the one you live in now. What are the differences between those two homes? Provide me with as many details as possible.", "당신이 예전에 살았던 집과 지금 살고 있는 집을 비교하세요. 두 집 사이에는 어떤 차이점들이 있나요? 되도록 상세히 설명해 주세요.", "비교", "IM3"], ["I’d like to talk about any changes to your home in the last 10 years. Describe in detail the similarities and differences between your home today and a home when you grew up.", "지난 10년 동안 여러분의 집에 어떤 변화가 있었는지에 대해 이야기하고 싶습니다. 오늘날 여러분의 집과여러분이 자랐을 때의 집의 유사점과 차이점을 자세히 설명하세요.", "비교", "IM3"], ["Have you ever had any problems with your home? What was the problem, and how did you deal with it? Give me as many details as possible.", "집에서 어떤 문제를 겪은 적이 있나요? 문제가 무엇이었으며, 어떻게 해결했나요? 되도록 상세히 설명해주세요.", "경험", ""], ["I am going to give you a situation to act out. Imagine that you found a problem at your home. Ask a repair person three or four questions about the problem you want to fix.", "여러분이 집에서 문제를 발견했다고 상상해 보세요. 수리하는 사람에게 고치고 싶은 문제에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry. You already made an appointment with the repair person, but a problem has come up. Now, you won’t be available on the day you made a reservation. Call the repair person and explain the situation. Then, give two or three alternatives.", "이미 수리 기사님과 약속을 했는데 문제가 생겼습니다. 지금은 예약한 날에 시간이 안 됩니다. 수리 기사님께 전화해서 상황을 설명해주세요. 그 다음, 2~3가지 대안을 제시해주세요.", "RP", ""]]}, {"ch": "CH4", "title": "가구", "q": [["Tell me about your favorite piece of furniture in your house. What does it look like? Why is it your favorite? Give me as many details as possible.", "당신이 집에서 가장 좋아하는 가구에 대해 이야기해주세요. 그 가구는 어떻게 생겼나요? 왜 그 가구를 가장 좋아하나요? 가능한 한 상세한 내용을 많이 알려주세요.", "묘사", ""], ["What is your favorite piece of furniture in the house? How do you use it? What makes it special? Give me as many details as possible.", "당신이 집에서 가장 좋아하는 가구는 무엇인가요? 그것을 어떻게 사용하나요? 무엇이 그 가구를 특별하게만드나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Can you tell me about a piece of furniture you bought recently? Where did you buy that? Give me as many details as possible.", "당신이 최근에 산 가구에 대해 이야기해 줄 수 있나요? 당신은 그것을 어디에서 샀나요? 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["Have you experienced any problems with your electronics? Describe a recent difficulty you faced, and explain how it happened. How did you solve this problem?", "당신의 전자제품과 관련된 어떤 문제를 경험한 적이있나요? 당신이 직면한 최근의 어려움을 묘사하고,어떻게 그 일이 일어났는지 설명해 주세요. 당신은 이문제를 어떻게 해결했나요?", "경험", ""], ["Can you remember a time when you borrowed an electronic appliance that became damaged or broken? What was the problem, and how did it happen? How did you solve it?", "당신이 빌려온 가전제품이 손상되거나 고장 났던 때를 기억할 수 있나요? 문제가 무엇이었고, 어떻게 그일이 일어났나요? 당신은 그것을 어떻게 해결했나요?", "경험", ""], ["I’d like to talk about any changes to furniture in your home in the last 10 years. Describe the differences between furniture in your home today and furniture in a home when you grew up.", "저는 지난 10년 동안 여러분의 집에 있는 가구에 어떤 변화가 있었는지에 대해 이야기하고 싶습니다. 오늘날 여러분의 집에 있는 가구와 여러분이 자랐을 때집에 있는 가구의 차이점을 설명해주세요.", "비교", "IM3"], ["I am going to give you a situation to act out. Imagine that you have gone to a store to buy new furniture. Ask the sales person three or four questions about the furniture you are looking for.", "당신이 새 가구를 사러 가게에 갔다고 상상해 보세요. 판매원에게 당신이 찾고 있는 가구에 대해 서너 가지질문을 하세요.", "RP", ""], ["I’m sorry, but you have a problem to resolve. The furniture you were planning to buy is no more available. Explain the sales clerk why you need the furniture, and give 2 or 3 suggestions to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하려던 가구는 더 이상 사용할 수 없습니다. 판매원에게가구가 필요한 이유를 설명하고 문제 해결을 위해2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You have received the furniture you bought, but there is something wrong with the furniture. Call the furniture store, explain the situation, and ask for a way to get an exchange or a refund.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하신가구는 받으셨지만 가구에 이상이 있습니다. 가구 매장에 전화해서 상황을 설명하고 교환이나 환불을 받을 수 있는 방법을 문의해 보세요.", "RP", ""], ["I’d like to give you a situation to act out. You would like to buy a MP3 player. Call your friend and ask about the MP3 player he or she is using. Ask 3 or 4 questions that will help you decide whether you want to buy the MP3 player your friend is using.", "당신은 MP3 플레이어를 사고 싶습니다. 당신의 친구에게 전화해서 그 혹은 그녀가 사용하고 있는 MP3플레이어에 대해 물어보세요. 당신이 당신의 친구가사용하고 있는 MP3 플레이어를 사고 싶은지 아닌지결정하는 데 도움이 될 3, 4개의 질문을 하세요.", "RP", ""], ["I’d like to give you a situation to act out. Suppose that you are going to borrow an MP3 player from your friend. Explain why you need it and ask your friend 3 or 4 questions about the MP3 player.", "당신이 친구에게 MP3 플레이어를 빌린다고 가정해보세요. 왜 그것이 필요한지 설명하고 친구에게 MP3플레이어에 대해 3, 4가지 질문을 하세요.", "RP", ""], ["I’m sorry, but you have a problem to resolve. You accidentally broke your friend’s MP3 player. Explain the situation to your friend and give 2 or 3 suggestions to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 실수로 친구의 MP3 플레이어가 고장났습니다. 친구에게 상황을 설명하고 2~3가지 제안을 하면 문제가 해결됩니다.", "RP", ""]]}, {"ch": "CH5", "title": "영화", "q": [["In your background survey, you indicated that you like to see movies. What kind of movies do you enjoy watching? Why do you like?", "배경 설문에서, 당신은 영화 관람을 좋아한다고 했습니다. 어떤 종류의 영화를 보기 좋아하나요? 왜 좋아하나요?", "묘사", ""], ["In your background survey, you indicated that you enjoy watching movies. What is your favorite type of movie and why? Please provide as many details as possible.", "배경 설문에서, 당신은 영화를 보는 것을 즐긴다고 했습니다. 가장 좋아하는 영화 종류는 무엇이고 왜 좋아하나요? 되도록 상세한 내용을 많이 제시해 주세요.", "묘사", ""], ["I also like to watch movies. Ask me 3 or 4 questions to find out the movie I like to watch.", "저도 영화 보는 것을 좋아해요. 제가 좋아하는 영화에대해 질문 서너개를 해보세요.", "RP", ""], ["Who is your favorite actor? What movies has this actor starred in? What do you like about him or her?", "가장 좋아하는 배우는 누구인가요? 그 배우가 어떤영화에 출연했나요? 당신은 그 배우의 어떤 점을 좋아하나요?", "묘사", ""], ["I’d like you to tell me about your favorite actor. Who is the actor? What movies has he or she starred in? What do you like most about him or her? Please tell me about the actor in as much detail as possible.", "당신이 가장 좋아하는 배우에 대해 알고 싶어요. 누구인가요? 그 배우가 어떤 영화에 출연했나요? 그 배우의 어떤 점을 가장 좋아하나요? 그 배우에 대해 되도록 상세히 이야기해 주세요.", "묘사", ""], ["What is your routine when you go to the theater? What do you do before watching movies? What about after? Please describe your routine in detail.", "당신이 극장에 갈 때 늘 하는 일상적인 일은 무엇인가요? 영화를 보기 전에 무엇을 하나요? 영화를 본 후에는 어떤가요? 당신의 일상에 대해 상세히 묘사해주세요.", "묘사", ""], ["I’d like to give you a situation and act it out. One of your friends has told you about a new movie that sounds interesting. Ask your friend 3 or 4 questions about the movie.", "상황을 줄테니 연기해보세요. 당신의 친구 중 한 명이당신에게 재밌을 것 같은 새 영화에 대해 말했습니다. 친구에게 영화에 대해 서너 가지 질문을 하세요.", "RP", ""], ["Talk about a movie you remember best. What was it about? Who was in it? How did you feel when watching it?", "가장 기억에 남는 영화에 대해 이야기해 주세요. 무엇에 관한 영화였나요? 누가 그 영화에 출연했나요? 그영화를 보면서 어떤 느낌이 들었나요?", "경험", ""], ["Please tell me about the most memorable movie you have seen. What was the movie about? Who was in it? Why was it memorable?", "당신이 본 영화 중 가장 기억에 남는 영화에 대해 이야기해 주세요. 무엇에 관한 영화였나요? 누가 출연했나요? 왜 그 영화가 기억에 남나요?", "경험", ""], ["Has your taste in movies changed over time? How are the movies you enjoy now different from those in the past? Please explain in as much detail as possible.", "당신의 영화 취향이 시간이 지나면서 변했나요? 현재당신이 즐기는 영화들은 과거에 즐겼던 영화들에 비해 어떻게 다른가요? 되도록 상세히 설명해 주세요.", "비교", "IH"]]}, {"ch": "CH6", "title": "음악 감상하기", "q": [["In your background survey, you indicated that you enjoy listening to music. What kind of music do you like? Who is your favorite singer or composer?", "배경 설문에서, 당신은 음악 감상을 즐긴다고 했습니다. 당신은 어떤 종류의 음악을 좋아하나요? 당신이가장 좋아하는 가수 또는 작곡가는 누구인가요?", "묘사", ""], ["Tell me about your favorite musician or singer. What kind of songs does he or she sing? Why do you like him or her? Describe him or her in as much detail as possible.", "당신이 가장 좋아하는 음악가나 가수에 대해서 이야기해 주세요. 그 가수가 어떤 종류의 노래를 부르나요? 당신은 그 가수를 왜 좋아하나요? 그 가수에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["In your background survey, you indicated that you enjoy listening to music. What kind of music do you like? Why do you like it? When and where do you usually listen to music? How do you listen to music?", "배경 설문에서, 당신은 음악 감상하기를 좋아한다고했습니다. 어떤 종류의 음악을 좋아하나요? 왜 그 음악을 좋아하나요? 언제 그리고 어디서 주로 음악을감상하나요? 어떤 방법으로 음악을 감상하나요?", "묘사", ""], ["Where and when do you usually listen to music? What do you use to listen to music? Provide as many details as possible in your response.", "당신은 어디에서 그리고 언제 주로 음악을 듣나요? 음악을 듣기 위해 무엇을 사용하나요? 답변에 되도록상세한 내용을 많이 제시하세요.", "RP", ""], ["What is your favorite song? What makes it so special? Do you have a special memory associated with the song?", "당신이 가장 좋아하는 노래는 무엇인가요? 무엇 때문에 그 노래가 그렇게 특별한가요? 그 노래와 관련된특별한 추억이 있나요?", "묘사", ""], ["Has your taste in music changed over time? What types of music did you enjoy in the past? How is it different from now? Please explain in as much detail as possible.", "당신의 음악 취향이 시간이 지나면서 변했나요? 과거에는 어떤 음악 장르를 좋아했나요? 지금과 어떻게다른가요? 되도록 상세히 설명해 주세요.", "비교", "IH"], ["Tell me about a time when you went to listen to some live music. Perhaps it was at a concert or a live cafe. What was the mood like and how did you like the music you listened to there?", "라이브 음악을 들으러 갔던 때에 대해 말해보세요. 콘서트나 라이브 카페에서 같은 거요. 분위기는 어땠고거기서 들은 음악은 어땠나요?", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you are planning to buy tickets for a concert to go with your friend. Call the theater and ask 2 or 3 questions about ways to get tickets.", "상황을 줄테니 연기해보세. 친구와 함께 갈 콘서트 티켓을 구매할 계획이라고 상상해 보세요. 극장에 전화해서 티켓을 구매하는 방법에 대해 두세 가지 질문을하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You have already bought the concert tickets, but a problem has come up. Call your friend, explain your situation, and give your friend 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 콘서트 티켓을 구매하셨는데 문제가 생겼습니다. 친구에게 전화해서 상황을 설명하고 친구에게 2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. The tickets you wanted to purchase are already sold out. Call your friend and give 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 구매하고자 하는 티켓이 품절입니다. 친구에게 전화해서 2~3가지 제안을 하세요.", "RP", ""], ["I would like you to choose two genres of music you like and compare them. What are the differences between them? How do you feel when you listen to each type of music? Provide as many details as possible.", "당신이 좋아하는 음악 장르를 두 가지 골라서 그 둘을비교해 보세요. 그들 간에 차이점은 무엇인가요? 각종류의 음악을 들을 때 당신은 어떤 기분이 드나요? 되도록 상세히 설명해 주세요.", "비교", "IH"], ["What kind of devices do people like to listen to music on? Can you tell me about the popular ones? Why do people like them? Please explain about the devices in as much detail as possible.", "사람들은 어떤 종류의 기기로 음악을 듣기 좋아하나요? 인기 있는 기기들에 대해 이야기해 줄 수 있나요? 사람들이 그것들을 왜 좋아하나요? 기기들에 대해서 되도록 상세히 설명해 주세요.", "묘사", ""], ["Compare the device people use to listen to music between the past and nowadays. How is it different? What device did people use and what do people use now? Provide as many details as possible in differences.", "사람들이 과거와 오늘날에 쓰는 음악을 듣는 장비를비교해 보세요. 어떻게 다른가요? 사람들이 과거에는어떤 장비를 썼고 지금은 어떤걸 사용하나요? 차이점에 있어 최대한 자세히 얘기해보세요.", "비교", "IH"]]}, {"ch": "CH7", "title": "공원/해변/캠핑하기", "q": [["You indicated in the survey that you like to go to the park. Describe your favorite park in as much detail as possible. What makes it so special?", "당신은 설문에서 공원에 가는 것을 좋아한다고 했습니다. 당신이 가장 좋아하는 공원에 대해 가능한 한상세히 묘사해 주세요. 무엇 때문에 그곳이 그렇게 특별한가요?", "묘사", ""], ["Please tell me about the activities people do at a park you often visit. What sorts of things do children do? How are they similar to or different from what adults do?", "당신이 자주 방문하는 공원에서 사람들이 하는 활동에 대해 이야기해 주세요. 아이들은 어떤 일을 하나요? 그것은 어른들이 하는 일과 어떻게 같거나 다른가요?", "묘사", ""], ["In your background survey, you mentioned that you like going to parks. Please tell me about the park you like to go to. Where is it located, and what does it look like? What makes it special?", "배경 설문에서, 당신은 공원 가기를 좋아한다고 했습니다. 당신이 가기 좋아하는 공원에 대해 이야기해 주세요. 어디에 위치해 있고, 어떻게 생겼나요? 무엇이그곳을 특별하게 만드나요?", "묘사", ""], ["Tell me about what you usually do at the park. What is a typical day at the park like from beginning to end?", "당신이 주로 공원에서 무엇을 하는지에 대해 이야기해 주세요. 시작부터 끝까지 공원에서의 전형적인 하루는 어떤가요?", "묘사", ""], ["What kind of activities do you usually do at the park?? Do you prefer to go there with others, or do you prefer to go alone? Please describe a typical day at the park.", "당신은 공원에서 주로 어떤 활동을 하나요? 다른 사람들과 같이 가는 것과 혼자 가는 것 중 어떤 것을 선호하나요? 공원에서의 일반적인 하루를 설명해 주세요.", "묘사", ""], ["How often do you go to the park? Who do you usually go with? What do you like to do? Tell me in as much detail as possible.", "당신은 얼마나 자주 공원에 가나요? 주로 누구와 함께 가나요? 무슨 일을 하기 좋아하나요? 가능한 한상세히 이야기해 주세요.", "묘사", ""], ["I’d like to give you a situation to act out. You have made plans with your friend to go to a local park. Call your friend and ask them 3 or 4 questions about your plans.", "상황을 줄테니 연기해 보세요. 당신은 동네 공원에 가기 위해 친구와 계획을 세웠습니다. 친구에게 전화해서 계획에 대해 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but a problem has come up at the last minute. Now, you won't be able to meet your friend at the park. Call your friend and explain your situation. Tell your friend why you can’t make it in detail. Give your friend one or two alternatives for what you can do.", "안타깝게도, 마지막 순간에 문제가 생겼습니다. 이제,당신은 공원에서 친구를 만날 수 없을 것입니다. 친구에게 전화해서 당신의 상황을 설명하세요. 당신이 왜그것을 할 수 없는지 친구에게 자세히 말하세요. 한두 가지 대안을 주세요.", "RP", ""], ["Please tell me about something interesting or memorable that has happened at a park. When was it? What were you doing? Please describe why it was so memorable in detail.", "공원에서 생긴 흥미롭거나 기억에 남는 일에 대해 이야기해 주세요. 언제였나요? 당신은 무엇을 하고 있었나요? 왜 그 일이 기억에 남는지 상세히 설명해 주세요.", "경험", ""], ["Please tell me about a time something interesting or unexpected happened at the park. Where and when did it occur? What were you doing at the time?", "공원에서 재미있거나 예상치 못했던 일이 있었던 때에 대해 이야기해 주세요. 어디에서 그리고 언제 그일이 일어났나요? 그때 당신은 무엇을 하고 있었나요?", "경험", ""], ["You indicated in your background survey that you like going to beaches. Tell me about your favorite beach. Where is it, and what does it look like?", "배경 설문에서, 당신은 해변에 가는 것을 좋아한다고했습니다. 가장 좋아하는 해변에 대해 이야기해 주세요. 어디에 있고, 어떻게 생겼나요?", "묘사", ""], ["Tell me about a memorable experience you have had at the beach. What happened? Who were you with? Explain what happened in detail to make it unforgettable.", "당신이 해변에서 겪었던 특별한 경험에 대해 이야기해 주세요. 무슨 일이 있었나요? 누구와 함께였나요? 어떤 일이 그 경험을 잊지 못하게 만들었는지 상세히설명해 주세요.", "경험", ""], ["What items do you pack for a beach trip? Why do you take them with you? Provide as many details as possible.", "해변으로 여행을 갈 때 어떤 물건을 싸 가나요? 왜 그물건을 가져가나요? 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["What do you usually do when you go camping? Please tell me everything you do on a camping trip.", "캠핑 여행을 갈 때 당신은 주로 무엇을 하나요? 캠핑여행 중에 당신이 하는 모든 일을 말해주세요.", "묘사", ""], ["In your background survey, you indicated that you like going camping. How often do you go camping, and what time of the year do you typically go?", "배경 설문에서, 당신은 캠핑 가는 것을 좋아한다고 했습니다. 얼마나 자주 캠핑을 가고, 보통 일 년 중 언제캠핑을 가나요? 주로 누구와 함께 가나요?", "묘사", ""], ["When was the last time you went camping? Where did you go? Who did you go with? Describe what you did on your camping trip in as much detail as you can.", "당신이 마지막으로 캠핑을 갔던 것은 언제인가요? 어디로 갔나요? 누구와 함께 갔나요? 캠핑을 가서 무엇을 했는지 되도록 상세히 설명해 주세요.", "경험", ""], ["What sort of gear do you bring along when you go camping? Please describe the items you bring in detail, and explain what you use them for.", "당신은 캠핑을 갈 때 어떤 종류의 장비를 가져가나요? 가져가는 도구를 상세히 설명하고 그 도구들을어디에 쓰는지 설명해 주세요.", "묘사", ""], ["I’m going to give you a situation to act out. Suppose that you are going to a camping shop to rent some camping gear for your next camping trip with your friends. Ask the clerk 3 or 4 questions about the camping gear you would like to rent.", "상황을 줄테니 연기해보세요. 친구들과의 캠핑을 위해 캠핑용품점에 가서 캠핑 장비를 빌립니다. 빌리고자 하는 캠핑 장비에 대해 질문을 서너개 해보세요.", "RP", ""], ["I’m sorry, but there’s a problem I need you to resolve. Upon receiving the camping gear, you noticed that there’s an issue with the camping gear. Call the camping shop, explain the situation and ask for a way to get an exchange or a refund.", "해결해야 할 문제가 있습니다. 캠핑 용품을 받았는데,문제가 있는 것을 발견했습니다. 캠핑용품점에 전화하여, 문제 상황을 설명한 후, 교환이나 환불을 요청해보세요.", "RP", ""]]}, {"ch": "CH8", "title": "음식/식당", "q": [["Is there a particular restaurant you often go to? What kind of food does it serve? Why do you like to go there?", "당신이 자주 가는 특정 식당이 있나요? 그 식당은 어떤 종류의 음식을 제공하나요? 당신은 왜 그곳에 가는 것을 좋아하나요?", "묘사", ""], ["I would like to know about a restaurant you often visit. What kind of dishes does it serve? What do you like about the restaurant? What does it look like?", "당신이 자주 방문하는 식당에 대해서 알고 싶어요. 그곳은 어떤 종류의 음식을 파나요? 당신이 그 식당에대해 좋아하는 점은 무엇인가요? 그곳은 어떻게 생겼나요?", "묘사", ""], ["What was the last restaurant you ate at? What did you have there? Who did you go with? Provide as many details in your response as possible.", "마지막으로 식사한 식당이 어디였나요? 당신은 그곳에서 무엇을 먹었나요? 누구와 함께 갔나요? 되도록답변에 세한 내용을 많이 제시하세요.", "RP", ""], ["Have you ever had a special experience at a restaurant? Who were you with? What happened? Tell me about the experience in detail, and explain what made it memorable.", "당신은 식당에서 특별한 경험을 한 적이 있나요? 누구와 함께 있었나요? 무슨 일이 있었나요? 그 경험에대해 상세히 말해 보고, 무엇이 그 경험을 기억에 남게 만들었는지 이야기해 주세요.", "경험", ""], ["Many countries have special or unique foods. What are some of the traditional dishes in your country? Please describe them in detail.", "많은 나라들이 특별하거나 고유한 음식을 가지고 있습니다. 당신의 나라에는 어떤 전통 음식들이 있나요? 그것들에 대해서 상세히 묘사해 주세요.", "묘사", ""], ["Tell me about the most famous dish of your country. What are the main ingredients in it? Do you know how to make it? What is special about the dish?", "당신 나라에서 가장 유명한 요리에 대해 이야기해 주세요. 거기에 들어가는 주재료는 무엇인가요? 어떻게만드는지 아나요? 그 요리의 특별한 점은 무엇인가요?", "묘사", ""], ["I am going to give you a situation to act out. You want to go to a restaurant next week with your friends. Call the restaurant and make a reservation for you and your friends.", "상황을 줄테니 연기해 보세요. 다음 주에 친구들과 식당에 가려고 합니다. 식당에 전화해서 당신과 친구들을 위해 예약을 하세요.", "RP", ""], ["I'd like to give you a situation and ask you to act it out. You're planning to go to the restaurant this weekend with your friends. Call the restaurant and book a table for you and your friends.", "상황을 줄테니 연기해 보세요. 이번 주말에 친구들과레스토랑에 가려고 합니다. 레스토랑에 전화해서 친구들과 테이블을 예약해주세요.", "RP", ""], ["I'd like to give you a situation and want you to act it out. You are just invited to a dinner party at a restaurant. Call your friend and ask 3 or 4 questions about the restaurant and the party.", "상황을 줄테니 연기해 보세요. 친구가 저녁 식사 자리에 초대를 해주었습니다. 식당과 식사 자리에 대해 질문을 세네가지 해보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the date you wanted to book a table is not available. Tell the server why you want to make a reservation, then give 2 or 3 suggestions.", "죄송하지만 해결해 주셔야 할 문제가 있습니다. 손님이 예약하려는 날짜가 비어있는 것을 알게 되셨습니다. 직원에게 예약하려는 이유를 말한 다음 2~3개의제안을 하세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. While having dinner, you found out that there's something wrong with the food you ordered. Explain the situation to the server, and ask for a refund.", "죄송하지만 해결해야 할 문제가 있습니다. 저녁을 먹다가 주문하신 음식에 이상이 있다는 것을 알게 되셨습니다. 직원에게 상황을 설명하시고, 환불을 요청하세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the dish was different from what you had ordered. Explain the situation to the server, and ask 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 음식이 주문한 것과 다르다는 것을 발견했습니다. 서버에 상황을 설명하고, 2~3개의 해결책을 물어보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You already made a reservation for dinner, however, you are not available on the day you're supposed to meet your friend. Call your friend, explain your situation, and suggest 2 or 3 alternatives.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 저녁식사 예약을 했지만 친구를 만나기로 한 날에 당신이만날 수 없게 되었습니다. 친구에게 전화해서 상황을설명하고 2~3가지 대안을 제안해 보세요.", "RP", ""], ["I'm sorry, but there is a problem I need you to resolve. You found out that the date you wanted to book a table is not available. Call your friend, explain the situation, and suggest 2 or 3 alternatives.", "죄송하지만 해결해야 할 문제가 있습니다. 당신이 테이블 예약을 원하는 날짜가 예약이 불가합니다. 친구에게 전화해서 상황을 설명하고 2~3가지 대안을 제시해주세요.", "RP", ""]]}, {"ch": "CH9", "title": "자전거, 조깅, 걷기, 하이킹", "q": [["In your background survey, you mentioned that you like to jog. Do you have a specific place you like to go for jogging? Where is it located?", "설문조사에서 조깅하는 것을 좋아한다고 응답하셨네요. 특별히 조깅하러 좋아하는 장소가 있을까요? 어디에 위치해있나요?", "묘사", ""], ["When did you first become interested in jogging? Why did you start? Has your physical condition changed since you started jogging? How has it changed?", "언제 조깅에 관심을 갖게 되었나요? 왜 시작하게 되었나요? 조깅을 시작하고부터 신체적 변화가 있나요? 어떻게 변했나요?", "비교", "IH"], ["What items do you wear or bring when you go jogging? What do you usually do to take safety precautions from getting injuries?", "조깅을 갈 때 입거나 챙기는 것들이 있나요? 부상을예방하기 위해 어떤 예방조치를 취하나요?", "묘사", ""], ["You indicated in the survey that you enjoy cycling. Describe a memorable experience you have had while cycling. When did it occur? Who were you with? What happened?", "당신은 설문에서 자전거 타는 것을 즐긴다고 했습니다. 자전거를 타던 중 있었던 기억에 남는 경험에 대해 묘사해 주세요. 언제 그 일이 일어났나요? 누구와함께 있었나요? 무슨 일이 있었나요?", "경험", ""], ["There are many different types of bicycles. Please describe your bicycle in detail. What does it look like? Where did you buy it?", "여러 가지 종류의 자전거가 많이 있습니다. 당신의 자전거를 상세히 묘사해 주세요. 자전거가 어떻게 생겼나요? 자전거를 어디에서 구입했나요?", "묘사", ""], ["Cycling is a very popular hobby. When do you enjoy riding your bicycle? Where do you usually go and with whom?", "자전거 타기는 매우 인기 있는 취미입니다. 당신은 언제 자전거를 즐겨 타나요? 주로 어디를 가고 누구와함께 가나요?", "묘사", ""], ["When do you usually ride your bicycle? Where do you go for a ride? How often do you ride it and with whom? How do you feel when you ride your bike?", "당신은 언제 주로 자전거를 타나요? 자전거를 타러어디로 가나요? 얼마나 자주 타고, 누구와 함께 타나요? 자전거를 탈 때 어떤 기분이 드나요?", "묘사", ""], ["How did you develop your interest in bike riding? Who taught you how to ride and how old were you? Provide as many details as possible.", "당신은 어떻게 자전거 타기에 대한 관심을 발전시켰나요? 누가 당신에게 자전거 타는 법을 가르쳐 주었고 당신은 몇 살이었나요? 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["When did you start riding bicycles? Why did you start, and who taught you? Was it difficult to learn? Are you good at it now? How have you improved your riding skill?", "당신은 언제 자전거를 타기 시작했나요? 왜 시작했고, 당신을 가르쳐준 사람은 누구인가요? 배우기 어려웠나요? 지금은 잘 타나요? 어떻게 자전거 타는 실력을 키웠나요?", "비교", "IH"], ["I’d like to give you a situation and act it out. Let’s suppose you are planning to rent a bike. Call the bike rental company and ask the clerk 2 or 3 questions.", "상황을 줄테니 연기해보세요. 당신이 전거 대여를 계획하고 있다고 가정해 보겠습니다. 자전거 대여 업체에 전화해서 점원에게 2, 3가지 질문을 하세요.", "RP", ""], ["I'm sorry, but there’s a problem I need you to resolve. The bike rental company said they don’t have the particular bike that you’re trying to rent. I would like you to explain to the staff why you really need it and suggest 2 or 3 alternatives to this matter.", "죄송하지만 해결해야 할 문제가 있습니다. 자전거 대여 업체에서 대여하려는 특정 자전거가 없다고 합니다. 직원에게 왜 꼭 필요한지 설명해주시고 이 문제에 대해 2~3가지 대안을 제시해주셨으면 합니다.", "RP", ""], ["Tell me about a memorable experience you have had while riding a bicycle. Where and when was it? Who were you with? Did something interesting or unexpected happen? What happened? Describe the experience in as much detail as you can.", "자전거를 타던 중 겪었던 기억에 남는 경험에 대해 이야기해 주세요. 언제 어디에서였나요? 누구와 함께있었나요? 흥미롭거나 예상치 못했던 일이 일어났나요? 어떤 일이 일어났나요? 그 경험에 대해 되도록상세히 설명해 주세요.", "경험", ""]]}, {"ch": "CH10", "title": "건강", "q": [["Tell me about a healthy person you know. What does he or she look like? What kind of food does he or she like to eat? How did you meet him or her? Provide as many details as possible.", "당신이 아는 가장 건강한 사람에 대해 이야기해 주세요. 그 사람은 어떻게 생겼나요? 그 사람은 어떤 종류의 음식을 즐겨 먹나요? 당신은 그 사람을 어떻게 만났나요? 되도록 상세히설명해 주세요.", "묘사", ""], ["There are many different ways to stay healthy. What do you think a person should do to stay healthy? Give me as many details as possible.", "건강을 유지하기 위한 여러 가지 방법들이 많이 있습니다. 당신은 사람들이 건강을 유지하기 위해 무엇을해야 한다고 생각하나요? 가능한 한 상세한 내용을많이 알려주세요.", "묘사", ""], ["Many people put a lot of effort into keeping themselves fit. Is there anything special that you do to keep healthy? Tell me what you do, and explain why you do it.", "많은 사람들은 건강을 유지하기 위해 많은 노력을 기울입니다. 당신은 건강을 지키기 위해 특별히 하는 것이 있나요? 당신이 무엇을 하는지, 그리고 그것을 왜하는지 이야기해 주세요.", "묘사", ""], ["Tell me about a health problem that you or a person close to you had. What were the symptoms? What did you or the other person do to get over it?", "당신 또는 당신과 가까운 사람이 겪었던 건강상의 문제에 대해 이야기해 주세요. 증세는 무엇이었나요? 당신 또는 다른 사람은 그것을 이겨내기 위해 무엇을했나요?", "경험", ""], ["Have you ever had to quit doing something for health reasons? What was it that you had to give up?", "건강상의 이유로 어떤 일을 하는 것을 그만둬야 했던적이 있나요? 당신이 포기해야 했던 것이 무엇이었나요?", "경험", ""]]}, {"ch": "CH11", "title": "국내/해외여행/집 휴가", "q": [["You indicated in the survey that you enjoy traveling within your home country. What are your favorite places to visit and why do you like them?", "당신은 설문에서 국내 여행을 하는 것을 즐긴다고 했습니다. 당신이 방문하기 가장 좋아하는 장소들은 어디이고 왜 그곳들을 좋아하나요?", "묘사", ""], ["In your background survey, you indicated that you enjoy domestic travel. Where do you like to visit? Which do you prefer, mountains or beaches?", "배경 설문에서, 당신은 국내 여행을 즐긴다고 했습니다. 어디를 방문하길 좋아하나요? 산과 해변 중 어느곳을 더 선호하나요?", "묘사", ""], ["In your background survey, you indicated that you enjoy domestic travel. What are the popular destinations in your country? Why is it popular?", "배경 설문에서, 당신은 국내 여행을 즐긴다고 했습니다. 당신의 나라에서 인기가 많은 여행지는 어디인가요? 왜 인기가 많나요?", "묘사", ""], ["More and more people are traveling abroad these days. When did you first travel abroad? Where did you go and who did you go with?", "점점 더 많은 사람들이 요즘 해외로 여행을 갑니다. 당신은 언제 처음 해외로 여행을 갔나요? 어디로 갔고 누구와 함께 갔나요?", "묘사", ""], ["You must have had a trip that was particularly memorable. Describe that trip, and tell me why it was unforgettable. Provide as many details as possible.", "당신은 특별히 기억에 남는 여행을 한 적이 있을 거예요. 그 여행에 대해 묘사하고 그것이 왜 잊지 못할 여행인지 이야기해 주세요. 되도록 상세한 내용을 많이제시하세요.", "RP", ""], ["What is the most memorable experience you have had while traveling? When and where did you go? What happened? Why was it memorable? Describe the experience in detail.", "여행을 하며 겪은 가장 기억에 남는 경험은 무엇인가요? 언제 어디로 여행을 갔나요? 무슨 일이 일어났나요? 왜 그 경험이 기억에 남았나요? 그 경험을 상세히 설명해 주세요.", "경험", ""], ["You may have faced a problem while on traveling. What kind of situation was it? What happened? How did you handle the problem?", "당신은 여행 도중에 문제에 직면한 적이 있을 것입니다. 어떤 종류의 상황이었나요? 무슨 일이 일어났나요? 어떻게 그 문제를 해결했나요?", "경험", ""], ["In your background survey, you indicated that you prefer to stay at home during vacations. How do you spend your vacations at home? What do you usually do? Give me as many details as possible.", "배경 설문에서, 당신은 집에서 휴가를 보내는 것을 선호한다고 했습니다. 집에서 어떻게 휴가를 보내나요? 보통 무엇을 하나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["I would like to know about the most memorable vacation you have spent at home. What did you do and who were you with? Why was it so memorable?", "당신이 집에서 보냈던 가장 기억에 남는 휴가에 대해알고 싶어요. 당신은 무엇을 했고, 누구와 함께였나요? 그것이 왜 그렇게 기억에 남았나요?", "경험", ""], ["Now, tell me about an unusual or unexpected experience you had during a vacation you spent at home. What are some things or events that you remember?", "이제, 여러분이 집에서 보낸 휴가 동안 겪었던 특이하거나 예상치 못한 경험에 대해 말해보세요. 여러분이기억하는 어떤 것들이나 사건들이 있나요?", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you are planning to go on a trip with your friend. Call a travel agency and ask 3 or 4 questions about the trip you want to go on.", "상황을 줄테니 연기해보세요. 여러분이 친구와 여행을 계획하고 있다고 상상해 보세요. 여행사에 전화해서 여러분이 가고 싶은 여행에 대해 서너 가지 질문을하세요.", "RP", ""], ["I’d like to give you a situation to act out. Imagine that you are planning to go on a trip. Call a travel agency and ask 3 or 4 questions to make a reservation for a hotel room.", "상황을 줄테니 연기해보세요. 여행을 계획하고 있다고 생각을 해보세요. 여행사에 전화해서 3, 4가지 질문을 하시면 호텔 방을 예약하실 수 있습니다.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. You arrived at the airport and found out there is a problem with your flights. Your flight got canceled and all other flights are full. Call the travel agency , explain the situation, and give 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 공항에 도착하셔서 항공편에 문제가 있음을 알게 되셨습니다. 항공편이 취소되었고 다른 항공편은 모두 만석입니다. 여행사에 전화해서 상황을 설명하고 2~3번의 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. There is a problem with the trip package you have already booked. Call the travel agency , explain the situation, and give 2 or 3 suggestions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 예약하신 여행 패키지에 문제가 있습니다. 여행사에 전화해서 상황을 설명하고 2~3가지 제안을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. There is a problem with the trip you have already booked. Call your friend, explain the situation, and suggest 2 or 3 solutions.", "죄송하지만 해결해야 할 문제가 있습니다. 이미 예약하신 여행에 문제가 있습니다. 친구에게 전화해서 상황을 설명하고 2~3가지 해결책을 제시해주세요.", "RP", ""]]}, {"ch": "CH12", "title": "호텔", "q": [["Tell me about the hotels in your country. Where are they usually located? What do they have? Give as many details as possible.", "당신 나라의 호텔에 대해 이야기해 주세요. 어디에 주로 위치해 있나요? 어떤걸 갖추고 있나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["What do you usually do when you arrive at a hotel? Describe the steps you take when you stay at a hotel.", "당신이 호텔에 도착하면 주로 무엇을 하나요? 당신이호텔에 숙박할 때 거치는 절차를 묘사해 주세요.", "묘사", ""], ["Please describe a memorable experience you have had while staying at a hotel. What happened? What made the experience memorable?", "호텔에 숙박하면서 가장 기억에 남았던 경험에 대해묘사해 주세요. 무슨 일이 있었나요? 무엇 때문에 그경험이 기억에 남나요?", "경험", ""], ["Tell me about a memorable experience you have had while staying at a hotel. When and where was it? What happened? Describe the experience in detail.", "호텔에 머무르면서 겪은 가장 기억에 남는 경험에 대해 이야기해 주세요. 언제 어디에서였나요? 어떤 일이 있었나요? 그 경험에 대해 상세히 묘사해 주세요.", "경험", ""], ["When was your most recent stay at a hotel? Which hotel did you stay at? What did you do at the hotel? Give me as many details as possible.", "가장 최근에 호텔에 머무른 것은 언제였나요? 어느호텔에서 머물렀나요? 호텔에서 무엇을 하셨나요? 되도록 상세히 설명해 주세요.", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you are staying at a hotel and have a free day to explore the city. Go to the front desk and ask 3 or 4 questions about what to do in the city.", "당신이 호텔에 묵고 도시를 탐험할 수 있는 자유로운하루를 보내고 있다고 상상해 보세요. 프런트에 가서도시에서 무엇을 해야 할지에 대해 서너 가지 질문을하세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. You left your bag in the taxi on the way to hotel. Call the taxi company and ask them how you can retrieve the bag.", "문제가 생겼습니다. 호텔로 가는 길에 택시 안에 가방을 두고 왔습니다. 택시 회사에 전화해서 가방을 찾을수 있는 방법을 물어보세요.", "RP", ""], ["Can you remember a time you stayed at a hotel for the last time? Where was it? What happened? Why is it so memorable?", "당신이 마지막으로 호텔에 머물렀던 때를 기억할 수있나요? 어디에 있었나요? 무슨 일이 있었나요? 어떤 점이 기억에 남나요?", "경험", ""], ["I’d like to give you a situation to act out. You are going to stay at a hotel. Ask the hotel staff 3 or 4 questions to make a reservation.", "호텔에 머무르려고 합니다. 예약을 하기 위한 질문을서너 가지 해보세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. The one you wanted to book is not available. Explain to the hotel staff why you need the room, and give 2 or 3 suggestions to make a reservation", "예약을 하려던 방이 나갔습니다. 호텔 직원에게 왜 방이 필요한지 설명하고, 예약을 하기 위해 제안 두 세개를 해보세요.", "RP", ""], ["I'm sorry, but there's a problem I need you to resolve. You found a problem in the room while you are staying at the hotel. Tell the hotel staff about the situation, and ask what they can do.", "호텔에 머물고 있는데, 방에 문제를 발견했습니다. 호텔 직원에게 상황을 설명하고, 뭘 해줄 수 있는지 물어보세요.", "RP", ""]]}, {"ch": "CH13", "title": "교통", "q": [["What is public transportation like in your country? Tell me which type of public transportation you prefer to use and why. Provide as many details in your response as possible.", "당신의 나라의 대중교통은 어떤가요? 어떤 종류의 대중교통을 이용하는 것을 선호하는지와 그 이유를 이야기해주세요. 되도록 답변에 상세한 내용을 많이 제시하세요.", "RP", ""], ["Can you tell me about the public transportation system in your country? Which type of transportation do you use the most and why? Give me as many details as possible.", "당신 나라의 대중교통에 대해 이야기해 줄 수 있나요? 당신은 어떤 종류의 대중교통을 가장 많이 이용하며, 그 이유는 무엇인가요? 되도록 상세히 설명해주세요.", "묘사", ""], ["I would like to know about the transportation people in your country use. What do people take on weekdays? How about on the weekends? And what do people use when they travel to the countryside?", "당신 나라에서 사람들이 이용하는 교통수단에 대해알고 싶습니다. 사람들은 평일에 무엇을 가지고 다니나요? 주말에는 어떤가요? 그리고 사람들은 지방으로 여행을 갈 때 무엇을 이용하나요?", "묘사", ""], ["Sometimes riding the subway or bus can be uncomfortable. Have you ever had any problems while taking public transportation? Please describe your experience in detail.", "가끔 지하철이나 버스를 타는 것은 불편할 수 있습니다. 대중교통을 이용하면서 문제가 있었던 적이 있나요? 당신의 경험에 대해 상세히묘사해 주세요.", "경험", ""], ["You may have had a time when you faced an uncomfortable situation while using the subway or bus. Can you tell me about that experience? When did it occur? How did you handle the situation?", "당신이 지하철이나 버스를 이용하면서 불편한 상황에 직면한 때가 있었을 것입니다. 그 경험에 대해 이야기해 줄 수 있나요? 언제 그 일이 일어났나요? 어떻게 그 상황을 해결했나요?", "경험", ""]]}, {"ch": "CH14", "title": "인터넷, 핸드폰", "q": [["Tell me about a website that you usually visit. What services does this website offer, and what things can you do on it? Explain in detail.", "당신이 주로 방문하는 웹사이트에 대해서 이야기해주세요. 이 사이트에서는 어떤 서비스를 제공하며, 당신은 이 사이트에서 어떤 일을 할 수 있나요? 상세히설명해 주세요.", "묘사", ""], ["When job seeking, people can get much information online. What websites do you often visit when job seeking? What information can you get from those websites? Please tell me about it in detail.", "구직할 때, 사람들은 온라인에서 많은 정보를 얻을 수있습니다. 구직할 때 어떤 웹사이트를 자주 방문하나요? 그 웹사이트에서 어떤 정보를 얻을 수 있나요? 그것에 대해 자세히 알려주세요.", "묘사", ""], ["Everyone uses the Internet these days. Where and when do you use it? What do you mainly use the Internet for?", "요즘에는 모든 사람들이 인터넷을 사용합니다. 당신은 언제 그리고 어디에서 인터넷을 사용하나요? 주로어떤 목적으로 인터넷을 사용하나요?", "묘사", ""], ["Everyone uses the Internet regularly these days. When did you use the Internet for the first time? Do you use it a lot these days? How much time do you spend on the Internet each day?", "요즘 모든 사람들이 정기적으로 인터넷을 사용합니다. 당신은 언제 처음으로 인터넷을 사용했나요? 요즘 인터넷을 많이 사용하나요? 하루 인터넷에 얼마나많은 시간을 보내나요?", "묘사", ""], ["Do you use your smartphone often? How frequently do you use? What do you usually do on your smartphone?", "당신은 핸드폰을 자주 사용하나요? 얼마나 자주 사용하나요? 핸드폰으로 보통 무엇을 하나요?", "묘사", ""], ["Can you describe a memorable experience you were using your cell phone. When was it? What happened?", "핸드폰을 사용하던 중에 겪었던 기억에 남는 경험을설명해 줄 수 있나요? 언제였나요? 어떤 일이 일어났나요?", "경험", ""], ["Sometimes problems can occur when using cell phones. Think about one of the problems while you were using your cell phone. What was the problem? How did you handle it?", "가끔 휴대폰을 사용할 때 문제가 발생할 수 있습니다. 휴대폰을 사용하는 동안 경험했던 문제점들 중 하나에 대해 생각해보세요. 무엇이 문제였을까요? 어떻게대처했나요?", "경험", ""]]}, {"ch": "CH15", "title": "패션", "q": [["I’d like to know the kinds of clothes people typically wear in your country. What do they wear when they are relaxing at home? How is it different from what they wear at work?", "당신의 나라에서 사람들이 보통 입는 옷의 종류를 알고 싶어요. 사람들은 집에서 휴식을 취할 때 무엇을입나요? 그것은 사람들이 직장에서 입는 것과 어떻게다른가요?", "비교", "IH"], ["Tell me about the changes in fashion trends in your country. What kind of clothes did people wear in the past? What do people wear these days? Describe the differences between them.", "당신 나라의 패션 트렌드의 변화에 대해 이야기해 주세요. 과거에는 사람들이 어떤 종류의 옷을 입었나요? 요즘은 사람들이 무엇을 입나요? 둘 사이의 차이점에 대해 설명해 주세요.", "비교", "IH-AL"], ["What kind of clothes do people in your country usually wear? Do they wear different clothes when they go to work and when they are relaxing? Describe the local attire in as much detail as possible.", "당신 나라의 사람들은 보통 어떤 종류의 옷을 입나요? 일하러 갈 때와 쉴 때 다른 옷을 입나요? 지역의복장에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["Tell me about the last time you went shopping for clothes. What did you buy and who did you go with?", "당신이 마지막으로 옷을 사러 갔던 때에 대해 이야기해 주세요. 무엇을 샀고, 누구와 함께 갔나요?", "경험", ""], ["I’d like to give you a situation to act out. Imagine that you want to go shopping with your friend. Call your friend and ask 3 or 4 questions about shopping together.", "상황을 줄테니 연기해보세요. 당신이 친구와 쇼핑을하고 싶다고 상상해 보세요. 친구에게 전화해서 함께쇼핑에 대해 서너 가지 질문을 해보세요.", "RP", ""], ["I’m sorry. You already made an appointment with your friend, but a problem has come up. Now, you won’t be available on the day you made an appointment. Call your friend and explain the situation. Then give two or three alternatives.", "죄송합니다. 이미 친구와 약속을 잡으셨는데 문제가생겼습니다. 지금은 약속하신 날에 시간이 안 됩니다. 친구에게 전화해서 상황을 설명해주세요. 그럼 2~3가지 대안을 주세요.", "RP", ""], ["I'm sorry, but there's a problem you need to resolve. You recently purchased a clothing item, but there's something wrong with the clothes. You want to return or exchange it. Call the store, explain your situation and find out how to resolve the problem.", "죄송하지만 해결해야 할 문제가 있습니다. 최근에 옷을 구매하셨는데, 문제가 있습니다. 반품이나 교환을원합니다. 매장에 전화해서 상황을 설명하고 문제를해결할 방법을 찾아보세요.", "RP", ""], ["I want you to give you a situation to act out. You need to buy some new clothes for a special occasion. Imagine you walk into a store, and ask the salesperson in a clothing store about the clothes you're looking for.", "당신에게 상황을 줄테니 연기해보세요. 당신은 특별한 이벤트를 위해 새 옷을 사야 합니다. 가게에 들어와서 옷 가게의 판매원에게 당신이 찾고 있는 옷에 대해 물어보세요.", "RP", ""], ["I want you to give you a situation and want you to act it out. You're interested in buying clothes online. Ask the customer service agent questions about the online shopping process, including shipping, returns, and any discounts available.", "당신에게 상황을 줄테니 연기해보세요. 당신은 온라인으로 옷을 사는 것에 관심이 있습니다. 고객 서비스센터 직원에게 배송, 반품 및 할인을 포함한 온라인쇼핑 과정에 대해 질문하십시오.", "RP", ""]]}, {"ch": "CH16", "title": "미용실", "q": [["Tell me about the hair salons in your country. Where are they usually located? Do they have any services or facilities that are unique to your country? Give as many details as possible.", "당신 나라의 미용실에 대해 이야기해 주세요. 어디에주로 위치해 있나요? 당신 나라에만 있는 독특한 시설이나 서비스가 있나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["When was your most recent visit to a hair salon? What hair services did you get? Give me as many details as possible.", "가장 최근에 미용실에 간 건 언제였나요? 어떤 헤어스타일을 받았나요? 되도록 상세히 설명해 주세요.", "경험", ""], ["I am going to give you a situation to act out. Let’s suppose that you went to a hair salon to change your hair style. Ask the stylist three or four questions about the style you would like to get.", "상황을 줄테니 연기해보세요. 당신은 헤어스타일을바꾸러 미용실에 갔습니다. 어떤 스타일을 원하는지미용사에게 서너 가지 질문을 하세요.", "RP", ""], ["I’m sorry, but there is a problem I need you to resolve. As the service was done, you looked into the mirror, however, you found out that the result was unsatisfying. Approach the stylist, explain the situation, and ask for a way to get a refund.", "죄송하지만 해결해 주셔야 할 문제가 있습니다. 서비스가 끝나면서 거울을 보셨는데, 결과가 불만족스럽습니다. 스타일리스트에게 가서 상황을 설명하고 환불 방법을 물어보세요.", "RP", ""], ["This is the end of the situation. Tell me about a problem you have had at a hair salon. When and where was it? What happened? How did you handle the situation? Describe the experience in as much detail as possible", "상황은 여기까지입니다. 미용실에서 겪은 문제에 대해 얘기해주세요. 언제, 어디에 있었나요? 무슨 일이있었나요? 어떻게 대처했나요? 가능한 한 자세히 설명해 주세요", "경험", ""]]}, {"ch": "CH17", "title": "은행", "q": [["People go to the bank for many reasons. Why do people go to the bank? Please give me as many details as possible.", "사람들은 여러 이유로 은행에 갑니다. 사람들이 왜 은행에 가나요? 가능한 한 상세한 내용을 많이 알려주세요.", "묘사", ""], ["Tell me about the banks in your country. Where are they located? When do they open and close? What do they look like? Please describe in as much detail as possible.", "당신의 나라의 은행에 대해 이야기해 주세요. 은행들은 어디에 위치해 있나요? 언제 문을 열고 닫나요? 어떻게 생겼나요? 가능한 한 상세히 묘사해 주세요.", "묘사", ""], ["ll me about the last time you went to a bank. What did you do at the bank? Please describe your experience in detail.", "당신이 마지막으로 은행에 갔던 때에 대해 이야기해주세요. 당신은 은행에서 무엇을 했나요? 당신의 경험을 상세히 묘사해 주세요.", "경험", ""], ["Have you ever experienced any problems at a bank?What sort of problem did you face, and how did you deal with it?", "당신은 은행에서 문제를 경험한 적이 있었나요? 당신은 어떤 종류의 문제에 직면했고, 그것을 어떻게 처리했나요?", "경험", ""]]}, {"ch": "CH18", "title": "약속", "q": [["People make appointments for a variety of reasons. What kinds of appointments do you usually make with people? Who do you make them with?", "사람들은 다양한 이유로 약속을 잡습니다. 당신은 사람들과 주로 어떤 종류의 약속을 잡나요? 그 약속들을 누구와 하나요?", "묘사", ""], ["People set up appointments for various reasons. Who do you usually meet with? Where do you usually meet them? Give me as many details as possible.", "사람들은 여러 가지 이유로 약속을 잡습니다. 주로 누구와 함께 만나나요? 어디서 주로 만나나요? 되도록 상세히 설명해 주세요.", "묘사", ""], ["Where do you like to meet your friends? Why do you prefer this place? Provide as many details as possible in your response.", "당신은 친구들을 어디서 만나는 것을 좋아하나요? 그장소를 왜 선호하나요? 답변에 되도록 상세한 내용을많이 제시하세요.", "RP", ""], ["Tell me about a particularly memorable appointment with your friends. What made this experience so unforgettable? Give me as many details as you can.", "친구들과의 특히 기억에 남는 약속에 대해 이야기해주세요. 무엇이 이 경험을 그렇게 잊을 수 없도록 만들었나요? 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["Tell me about the most memorable appointment you have ever had. What kind of appointment was it? Who did you meet? What did you do? Did anything unexpected or interesting occur? Why was it so memorable?", "지금까지 했던 약속 중 가장 기억에 남는 것에 대해서이야기해 주세요. 어떤 종류의 약속이었나요? 누구를만났나요? 무엇을 했`나요? 예상하지 못했던 일이나흥미로운 일이 있었나요? 그것이 왜 그렇게 기억에남았나요?", "경험", ""]]}, {"ch": "CH19", "title": "날씨, 지형", "q": [["The weather varies greatly from season to season. Tell me what the weather has been like these days. Provide as many details as possible.", "날씨는 계절마다 매우 다릅니다. 요즘 날씨가 어땠는지 이야기해 주세요. 되도록 상세한 내용을 많이 제시하세요.", "RP", ""], ["I would like to know about the seasons in your country. How many seasons are there? How are they different? What is the weather like in each season?", "저는 당신 나라의 계절에 대해 알고 싶어요. 몇 개의계절이 있나요? 계절들이 어떻게 다른가요? 각 계절의 날씨는 어떤가요?", "묘사", ""], ["Have you ever experienced something memorable because of the weather? Please explain what happened and why it was memorable. Give me as many details as possible.", "당신은 날씨 때문에 기억에 남는 어떤 일을 경험한 적이 있나요? 무슨 일이 있었고 그 일이 왜 기억에 남는지 설명해 주세요. 가능한 한 상세한 내용을 많이 알려주세요.", "경험", ""], ["Do you think that the weather has changed over the past few years? How has it changed? Please describe the differences in detail.", "당신은 지난 몇 년 사이에 날씨가 변했다고 생각하나요? 어떻게 변화했나요? 차이점에 대해 상세히 설명해 주세요.", "비교", "IH"], ["Tell me about the geography of your country. Are there a lot of lakes, rivers, beaches or mountains? Please describe it in as much detail as possible.", "당신 나라의 지리와 관련해 이야기해주세요. 호수나강, 해변, 또는 산이 많이 있나요? 가능한 한 자세히설명해주세요.", "묘사", ""], ["I would like to know about the geographic features of your country. What makes them different from other countries? Please describe them in as much detail as possible.", "당신 나라의 지형에 대해 알고 싶어요. 다른 나라에비해 어떤 점이 다른가요? 그것에 대해 되도록 상세히 설명해 주세요.", "묘사", ""], ["What kind of outdoor activities do people in your country do? Do they enjoy things like jogging, cycling, or hiking? Why do they like to do those activities?", "당신 나라의 사람들은 어떤 야외 활동을 하나요? 사람들이 조깅이나 사이클링, 하이킹 같은 것들을 즐기나요? 그들은 왜 그런 활동을 즐겨 하나요?", "묘사", ""], ["What kinds of activities do people in your country usually do for entertainment? Please give me a detailed description of the things that people like to do in your country.", "당신 나라의 사람들은 보통 취미로 어떤 활동을 하나요? 당신 나라의 사람들이 좋아하는 일을 자세히 설명해 주세요.", "묘사", ""], ["Describe the most memorable experience you have had outdoors. What is a beautiful place you have been to? Please provide as many details as possible.", "야외 활동 도중 겪었던 가장 기억에 남는 경험을 설명해 주세요. 당신이 가본 아름다운 곳은 어디였나요? 되도록 상세히 설명해주세요.", "경험", ""]]}, {"ch": "CH20", "title": "재활용", "q": [["How do you recycle at home? When and how often do you take out recyclable items? Describe the process in detail.", "당신은 집에서 어떻게 재활용을 하나요? 언제, 그리고 얼마나 자주 재활용품을 내놓나요? 그 과정을 상세히 묘사해 주세요.", "묘사", ""], ["How do you recycle at home? When and how often do you recycle? Describe each step of the process from beginning to end.", "당신은 집에서 어떻게 재활용을 하나요? 언제, 그리고 얼마나 자주 재활용을 하나요? 그 과정의 각 단계를 처음부터 끝까지 설명해 주세요.", "묘사", ""], ["Tell me about a memorable experience you have had while recycling. What happened and what did you do? Please describe the experience in detail.", "재활용을 하며 겪었던 기억에 남는 경험에 대해 이야기해 주세요. 무슨 일이 있었고, 당신은 무엇을 했나요? 그 경험에 대해 상세히 묘사해 주세요.", "경험", ""], ["How do the people in your country recycle? What items do they recycle? Tell me about the recycling system in your country in detail.", "당신의 나라의 사람들은 어떻게 재활용을 하나요? 어떤 물건을 재활용하나요? 당신의 나라의 재활용 시스템에 대해 상세히 이야기해 주세요.", "묘사", ""], ["Tell me about recycling in your country. What kind of items do people usually recycle? Please describe the recycling system in your country in detail.", "당신 나라의 재활용에 대해 이야기해 주세요. 사람들은 보통 어떤 종류의 물건을 재활용하나요? 당신 나라의 재활용 시스템을 상세히 설명해 주세요.", "묘사", ""], ["I want you to give you a situation to act out. You recently moved to a new apartment and want to figure out about recycling. Ask a property manager 3 or 4 questions to find out the proper way of recycling.", "상황을 줄테니 연기해보세요. 당신은 최근에 새로운아파트에 이사를 해서 재활용에 대해 알고 싶습니다. 건물관리인에게 적절한 재활용 방법을 알기 위해 질문 3~4개를 해보세요.", "RP", ""], ["You are in a park, and you see people littering despite the presence of recycling bins. Approach someone and explain the importance of keeping public spaces clean and recycling properly. How would you encourage responsible behavior?", "여러분은 공원에 있고, 재활용 쓰레기통이 있음에도불구하고 사람들이 쓰레기를 버리는 것을 볼 수 있습니다. 누군가에게 다가가서 공공장소를 깨끗하게 유지하고 재활용하는 것의 중요성에 대해 설명하세요. 여러분은 어떻게 책임감 있는 행동을 장려할 것인가요?", "RP", ""]]}];
const TYCLASS = {'묘사':'d','경험':'e','비교':'c','이슈':'i','RP':'r'};
let curCh = 0, rate = 0.75, voice = null;
const chtabsEl = document.getElementById('chtabs');
const mainEl = document.getElementById('main');
function pickVoice(){
  const list = speechSynthesis.getVoices();
  const en = list.filter(v=>/^en(-|_|$)/i.test(v.lang));
  const female=/(samantha|ava|allison|susan|karen|moira|tessa|fiona|serena|veena|zira|aria|jenny|jane|nanc|michelle|sonia|emma|amy|joanna|kendra|salli|nicole|female|woman|girl|google us english)/i;
  const male=/(daniel|alex\b|fred|tom\b|david|mark|guy|george|oliver|arthur|rishi|ryan|male)/i;
  const natural=/(natural|neural|online|enhanced|premium|siri)/i;
  const score=v=>{ const n=v.name.toLowerCase(); const us=/en[-_]?us/i.test(v.lang);
    const fem=female.test(n)&&!male.test(n);
    if(us&&fem&&natural.test(n))return 0; if(us&&fem)return 1;
    if(fem&&natural.test(n))return 2; if(fem)return 3; if(us)return 5; return 8; };
  en.sort((a,b)=>score(a)-score(b));
  voice = en[0] || list[0] || null;
}
speechSynthesis.onvoiceschanged = pickVoice; pickVoice();
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildTabs(){
  chtabsEl.innerHTML='';
  CHAPTERS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='chtab'+(i===curCh?' active':'');
    b.innerHTML='<small>'+c.ch+'</small>'+c.title;
    b.onclick=()=>{ stopAll(); curCh=i; render(); window.scrollTo(0,0); };
    chtabsEl.appendChild(b);
  });
}
function render(){
  buildTabs();
  const c=CHAPTERS[curCh];
  document.getElementById('hTitle').textContent=c.ch+' · '+c.title;
  let h='<div class="chead"><span class="badge">질문 '+c.q.length+'개</span>'+
        '<h2>'+esc(c.title)+'</h2><div class="cnt">▶ 영어 질문 듣기 · 문장을 눌러 뜻 보기</div>'+
        '<div class="legend">'+
        '<span class="qty d">묘사</span><span class="qty e">경험</span>'+
        '<span class="qty c">비교</span><span class="qty i">이슈</span>'+
        '<span class="qty r">RP</span>'+
        '<span style="font-size:11px;color:var(--sub);align-self:center;margin-left:2px;">비교 난이도 IM3&lt;IH&lt;IH-AL · 이슈 = AL</span></div></div>';
  c.q.forEach((pair,idx)=>{
    const en=pair[0], ko=pair[1]||'', ty=pair[2]||'묘사', sub=pair[3]||'';
    const tc=TYCLASS[ty]||'d';
    h+='<div class="q" data-i="'+idx+'">'+
       '<div class="numcol"><div class="num">'+(idx+1)+'</div>'+
       '<span class="qty '+tc+'">'+ty+(sub?'<b>'+sub+'</b>':'')+'</span></div>'+
       '<button class="play" aria-label="play">▶</button>'+
       '<div class="txt"><div class="en">'+esc(en)+'</div>'+
       '<div class="kohint">💬 뜻 보기 ▾</div>'+
       '<div class="ko">'+esc(ko)+'</div></div></div>';
  });
  mainEl.innerHTML=h;
  mainEl.querySelectorAll('.q').forEach(el=>{
    const i=+el.dataset.i;
    el.querySelector('.play').onclick=(ev)=>{ ev.stopPropagation(); speak(c.q[i][0], el); };
    el.querySelector('.txt').onclick=()=>{
      el.classList.toggle('show-ko');
      const hint=el.querySelector('.kohint');
      hint.textContent = el.classList.contains('show-ko') ? '💬 뜻 닫기 ▴' : '💬 뜻 보기 ▾';
    };
  });
}
function clearActive(){
  mainEl.querySelectorAll('.q.active').forEach(e=>{e.classList.remove('active');
    e.querySelector('.play').textContent='▶';});
}
function speak(text, el){
  stopAll(); clearActive();
  if(el){ el.classList.add('active'); el.querySelector('.play').textContent='❚❚'; }
  const u=new SpeechSynthesisUtterance(text);
  if(voice) u.voice=voice;
  u.rate=rate; u.pitch=1.05; u.lang=(voice&&voice.lang)||'en-US';
  u.onend=()=>{ clearActive(); }; u.onerror=()=>{ clearActive(); };
  speechSynthesis.speak(u);
}
function stopAll(){ speechSynthesis.cancel(); clearActive(); }
document.getElementById('stopBtn').onclick=stopAll;
document.getElementById('rateSeg').onclick=e=>{
  if(e.target.dataset.r){ rate=+e.target.dataset.r;
    [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on'); }
};
window.addEventListener('pagehide',stopAll);
render();
</script>
</body>
</html>
